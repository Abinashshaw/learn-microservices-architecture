server:
  port: 9094

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
      gateway:
        access: READ_ONLY

hotel:
  service:
    id: lb://HOTEL-SERVICE

rating:
  service:
    id: lb://RATING-SERVICE

user:
  service:
    id: lb://USER-SERVICE


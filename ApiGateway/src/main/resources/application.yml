server:
  port: 9096

spring:
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000
  logging:
    level:
      root: DEBUG
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
      gateway:
        access: READ_ONLY

hotel:
  service:
    id: HOTEL-SERVICE

rating:
  service:
    id: RATING-SERVICE

user:
  service:
    id: USER-SERVICE

resilience4j.circuitbreaker:
  configs:
    default:
      slidingWindowSize: 10
      waitDurationInOpenState: 10000
      permittedNumberOfCallsInHalfOpenState: 2
      failureRateThreshold: 50